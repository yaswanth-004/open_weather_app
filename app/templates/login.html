{% extends 'base.html' %}
{% block title %}Login - WeatherApp{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-toggle">
        <a href="{{ url_for('auth.login') }}" class="active">Log In</a>
        <a href="{{ url_for('auth.register') }}">Register</a>
    </div>

    <h2>Account Login</h2>
    <form action="{{ url_for('auth.login') }}" method="POST" class="auth-form">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Password" required>

        <button type="submit" class="btn btn-block">Log In</button>
    </form>
    <p class="form-footer-text">
        Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a>
    </p>
</div>
{% endblock %}
